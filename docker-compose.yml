version: '3.8'

services:

  # PHP Laravel App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supplychain_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - supplychain
    depends_on:
      - mysql

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: supplychain_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - supplychain
    depends_on:
      - app

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: supplychain_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: supply_chain_db
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: supplychain
      MYSQL_PASSWORD: supplychain
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - supplychain

  # phpMyAdmin (optional)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: supplychain_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: secret
    networks:
      - supplychain
    depends_on:
      - mysql

networks:
  supplychain:
    driver: bridge

volumes:
  mysql_data:
    driver: local
